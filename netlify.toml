[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
```

The first redirect maps `/api/auth/signup` → `/.netlify/functions/auth-signup` cleanly. The second ensures React Router deep links work after refresh.

