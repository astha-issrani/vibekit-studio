[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/auth/signup"
  to = "/.netlify/functions/auth-signup"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200
  force = true

[[redirects]]
  from = "/api/pages/:id/publish"
  to = "/.netlify/functions/pages-publish"
  status = 200
  force = true

[[redirects]]
  from = "/api/pages/:id/unpublish"
  to = "/.netlify/functions/pages-unpublish"
  status = 200
  force = true

[[redirects]]
  from = "/api/pages/:id/duplicate"
  to = "/.netlify/functions/pages-duplicate"
  status = 200
  force = true

[[redirects]]
  from = "/api/pages/:id"
  to = "/.netlify/functions/pages-get"
  status = 200
  force = true

[[redirects]]
  from = "/api/pages"
  to = "/.netlify/functions/pages-list"
  status = 200
  force = true

[[redirects]]
  from = "/api/public/pages/:slug/view"
  to = "/.netlify/functions/public-view"
  status = 200
  force = true

[[redirects]]
  from = "/api/public/pages/:slug/contact"
  to = "/.netlify/functions/public-contact"
  status = 200
  force = true

[[redirects]]
  from = "/api/public/pages/:slug"
  to = "/.netlify/functions/public-page"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200